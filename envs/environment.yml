name: sarscov2-pipeline
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip
  - fastqc=0.12.1
  - multiqc
  - trimmomatic
  - bwa
  - samtools
  - mosdepth
  - ivar
  - bedtools
  - mafft
  - iqtree
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - biopython
  - pysam
  - scipy
  - pyyaml
  - rich
  - click
  - jupyter
  - jupyterlab
  - r-base=4.3.1
  - r-essentials
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-readr
  - r-purrr
  - r-stringr
  - r-lubridate
  - r-patchwork
  - r-cowplot
  - r-viridis
  - r-yaml
  - r-knitr
  - r-rmarkdown
  - pip:
    - networkx
    - plotly
    - upsetplot
    - colorlog
    - geopandas
    - folium
